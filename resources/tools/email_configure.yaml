id: EmailConfigure
name: EmailConfigure
description: |-
  Configure the email subscriber so subscriptions whose `source_topic`
  is `email` start receiving events. Required once before installing any
  email subscription, and again whenever the user changes credentials.

  ## When to call

  - The user describes an email automation ("watch all my Zara emails",
    "save invoices to a database") and the email subscriber has not
    been configured.

  ## What you must collect from the user first (in plain conversation)

  1. **IMAP host** (e.g. `imap.gmail.com`) and optional port (defaults
     to 993 / TLS).
  2. **SMTP host** (e.g. `smtp.gmail.com`) and optional port (defaults
     to 587 / STARTTLS).
  3. **Username** — usually the full email address.
  4. **Password** — for many providers an app-specific password is
     required (Gmail, Fastmail, Outlook). Tell the user the password is
     stored locally in `~/.puffer/subscribers/email/state/config.toml`
     and never sent to Anthropic.
  5. **From address** — the address to use as the `From:` header when
     forwarding outbound messages. Almost always equal to `username`.
  6. Optional **allowed_senders** — a list of email addresses or domains
     (`@example.com`) the subscriber should pre-filter on. When omitted
     every inbound email becomes an event.

  ## Privacy

  Treat the password as a secret: do not echo it back, do not include
  it in any other tool call, do not write it to chat. After this call
  succeeds the agent should not ask for the password again unless the
  user requests a re-configuration.
handler: runtime:workflow:email_configure
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    imap_host:
      type: string
    imap_port:
      type: integer
      minimum: 0
      maximum: 65535
    smtp_host:
      type: string
    smtp_port:
      type: integer
      minimum: 0
      maximum: 65535
    username:
      type: string
    password:
      type: string
    from_address:
      type: string
    allowed_senders:
      type: array
      items:
        type: string
  required: [imap_host, smtp_host, username, password, from_address]
  additionalProperties: false
