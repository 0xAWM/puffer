id: SubscriberInstall
name: SubscriberInstall
description: |-
  Start a subscriber skill that has been scaffolded on disk. Validates
  the manifest and spawns the subscriber process under the supervisor.

  Lookup order: workspace `.puffer/subscribers/<id>/`, user
  `~/.puffer/subscribers/<id>/`, then bundled `resources/subscribers/<id>/`.

  Always confirm with the user before calling — installing runs an
  arbitrary `run` script with the user's local privileges.
handler: runtime:workflow:subscriber_install
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    id:
      type: string
      description: Subscriber id; must match a manifest on disk.
  required: [id]
  additionalProperties: false
