id: LSP
name: LSP
description: |-
  Interact with Language Server Protocol (LSP) servers to get code-intelligence
  features.

  Supported operations:
  - `goToDefinition`: find where a symbol is defined
  - `findReferences`: find all references to a symbol
  - `hover`: get documentation or type information for a symbol
  - `documentSymbol`: list symbols in a document
  - `workspaceSymbol`: search for symbols across the workspace
  - `goToImplementation`: find implementations of an interface or abstract method
  - `prepareCallHierarchy`: get the call-hierarchy item at a position
  - `incomingCalls`: find functions or methods that call the item at a position
  - `outgoingCalls`: find functions or methods called by the item at a position

  All operations require:
  - `filePath`: the file to operate on
  - `line`: the 1-based line number, as shown in editors
  - `character`: the 1-based character offset, as shown in editors

  If no LSP server is configured or available for the file type, the operation
  may return an error or reduced results.
handler: runtime:workflow:lsp
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    operation:
      type: string
      enum:
        - goToDefinition
        - findReferences
        - diagnostics
        - hover
        - documentSymbol
        - workspaceSymbol
        - goToImplementation
        - prepareCallHierarchy
        - incomingCalls
        - outgoingCalls
      description: The LSP operation to perform.
    filePath:
      type: string
      description: Absolute or relative file path for the operation.
    line:
      type: integer
      minimum: 1
      description: 1-based line number.
    character:
      type: integer
      minimum: 1
      description: 1-based character offset.
  required:
    - operation
    - filePath
    - line
    - character
  additionalProperties: false
