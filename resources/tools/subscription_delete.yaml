id: SubscriptionDelete
name: SubscriptionDelete
description: |-
  Permanently remove an installed subscription by id. Confirm with the
  user before calling — there is no undo.

  This does not delete any data the subscription has already produced
  (e.g. rows in the SQLite db it was writing to).
handler: runtime:workflow:subscription_delete
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    id:
      type: string
      description: Subscription id to remove.
  required: [id]
  additionalProperties: false
