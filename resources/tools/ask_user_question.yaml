id: AskUserQuestion
name: AskUserQuestion
description: |-
  Ask the user multiple-choice questions to gather information, clarify
  ambiguity, understand preferences, make decisions, or offer choices.

  Usage notes:
  - Users will always be able to select "Other" and provide custom text input.
  - Use `multiSelect: true` to allow multiple selections.
  - If you recommend a specific option, make it the first option and append
    "(Recommended)" to the label.
  - Use the optional `preview` field only when users need to compare concrete
    artifacts such as mockups, code snippets, diagrams, or configuration
    examples.
  - Do not use previews for simple preference questions.
  - Previews are only supported for single-select questions, not `multiSelect`.
  - In plan mode, use this to clarify requirements or choose between approaches
    before finalizing the plan.
  - Do not use this tool to ask whether the user approves the finished plan;
    use ExitPlanMode for plan approval instead.
  - In plan mode, do not ask about "the plan" directly because the user cannot
    see it until ExitPlanMode is called.
handler: runtime:workflow:ask_user_question
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    questions:
      type: array
      minItems: 1
      maxItems: 4
      items:
        type: object
        properties:
          question:
            type: string
            description: The complete question to ask the user.
          header:
            type: string
            description: Very short label shown as a chip/tag.
          options:
            type: array
            minItems: 2
            maxItems: 4
            items:
              type: object
              properties:
                label:
                  type: string
                  description: Display text for this option.
                description:
                  type: string
                  description: Explanation for this option.
                preview:
                  type: string
                  description: Optional preview content for this option.
              required:
                - label
                - description
          multiSelect:
            type: boolean
            description: Allow selecting multiple options.
        required:
          - question
          - header
          - options
        additionalProperties: false
    answers:
      type: object
      description: Optional user answers collected by the permission component.
      additionalProperties:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
    annotations:
      type: object
      description: Optional per-question annotations from the user.
      additionalProperties:
        type: object
        properties:
          preview:
            type: string
          notes:
            type: string
        additionalProperties: false
    metadata:
      type: object
      properties:
        source:
          type: string
      description: Optional metadata for tracking and analytics purposes.
      additionalProperties: false
  required:
    - questions
  additionalProperties: false
