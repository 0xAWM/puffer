id: TelegramLoginSubmitCode
name: TelegramLoginSubmitCode
description: |-
  Submit the login code Telegram texted to the user, after a previous
  `TelegramLoginStart`.

  After this call, watch for one of two outcomes from the subscriber:
  `login_complete` (you're done) or `login_awaiting_password` (the user
  has 2FA enabled — call `TelegramLoginSubmitPassword` next).
handler: runtime:workflow:telegram_login_submit_code
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    code:
      type: string
      description: The numeric login code Telegram delivered.
  required: [code]
  additionalProperties: false
