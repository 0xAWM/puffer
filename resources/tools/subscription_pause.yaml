id: SubscriptionPause
name: SubscriptionPause
description: |-
  Pause or resume an installed subscription by id. Paused subscriptions
  remain on disk but do not match new events.

  Use when the user says "pause my IoC watcher" / "stop the Zara forward
  for now". To resume: pass `paused: false`.
handler: runtime:workflow:subscription_pause
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    id:
      type: string
      description: Subscription id (as returned by SubscriptionList).
    paused:
      type: boolean
      default: true
      description: True to pause (default), false to resume.
  required: [id]
  additionalProperties: false
