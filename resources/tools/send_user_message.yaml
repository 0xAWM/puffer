id: SendUserMessage
name: SendUserMessage
description: |-
  Send a message the user will read.

  `message` supports markdown. `attachments` accepts file paths for images,
  diffs, logs, and similar artifacts. `status` is `normal` for a direct reply
  and `proactive` when you are initiating the update.

  Text outside this tool is visible in the detail view, but most users will not
  open it. Assume unread. Put the real answer here.

  Use this tool for the primary user-visible response channel on every turn. If
  you can answer immediately, send the answer. If you need to investigate
  first, send a one-line acknowledgement before working, then send the result.
  For longer work, prefer information-rich checkpoints over filler. Use
  `proactive` honestly when you are initiating the update yourself, such as a
  background task finishing or a blocker surfacing before the user asks.
handler: runtime:workflow:send_user_message
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    message:
      type: string
      description: The message for the user. Supports markdown formatting.
    attachments:
      type: array
      description: Optional file paths to attach.
      items:
        type: string
    status:
      type: string
      enum:
        - normal
        - proactive
      description: Use normal for direct replies and proactive for unsolicited updates.
  required:
    - message
    - status
  additionalProperties: false
