id: TaskOutput
name: TaskOutput
aliases:
  - AgentOutputTool
  - BashOutputTool
description: |-
  DEPRECATED: Prefer using the Read tool on the task's output file path instead. Background tasks return their output file path in the tool result, and you receive a <task-notification> with the same path when the task completes — Read that file directly.

  - Retrieves output from a running or completed task (background shell, agent, or remote session)
  - Takes a task_id parameter identifying the task
  - Returns the task output along with status information
  - Use block=true (default) to wait for task completion
  - Use block=false for non-blocking check of current status
  - Task IDs can be found using the /tasks command
  - Works with all task types: background shells, async agents, and remote sessions
handler: runtime:workflow:task_output
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    task_id:
      type: string
      description: The task ID to get output from.
    block:
      type: boolean
      description: Whether to wait for completion.
      default: true
    timeout:
      type: number
      minimum: 0
      maximum: 600000
      default: 30000
      description: Maximum wait time in milliseconds.
  required:
    - task_id
  additionalProperties: false
