id: Config
name: Config
description: |-
  Get or set Claude Code-style configuration settings.

  Use this when the user asks about current settings, requests a configuration
  change, or would benefit from adjusting a setting directly.

  Usage:
  - Omit `value` to read the current setting.
  - Provide `value` to update it.

  Currently supported settings in this runtime include:
  - `theme`
  - `model`
  - `editorMode`
  - `fastMode`
  - `effortLevel`
  - `promptColor`
  - `statuslineEnabled`
  - `default_provider`
  - `defaultProvider`
  - `default_model`
  - `defaultModel`
  - `openai_base_url`
  - `openaiBaseUrl`
  - `openai_headers`
  - `openaiHeaders`
  - `openai_query_params`
  - `openaiQueryParams`
  - `no_alt_screen`
  - `noAltScreen`
  - `tmux_golden_mode`
  - `tmuxGoldenMode`
  - `status_line_command`
  - `statusLineCommand`
  - `status_line_padding`
  - `statusLinePadding`

  Set `value` to `null` to clear optional settings such as `default_model`,
  `default_provider`, `openai_base_url`, `openai_headers`, or
  `openai_query_params`.

  Examples:
  - Get theme: `{ "setting": "theme" }`
  - Set theme: `{ "setting": "theme", "value": "dark" }`
  - Change model: `{ "setting": "model", "value": "openai/gpt-5" }`
  - Enable vim mode: `{ "setting": "editorMode", "value": "vim" }`
  - Turn on fast mode for this session: `{ "setting": "fastMode", "value": true }`
  - Update the status line command: `{ "setting": "statusLineCommand", "value": "echo hi" }`
handler: runtime:workflow:config
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    setting:
      type: string
      description: The setting key, such as theme, model, editorMode, default_model, or openai_headers.
    value:
      description: The new value; omit to get current value.
      oneOf:
        - type: "null"
        - type: string
        - type: boolean
        - type: object
          additionalProperties:
            type: string
  required:
    - setting
  additionalProperties: false
