id: SubscriptionList
name: SubscriptionList
description: |-
  List every installed subscription plus the subscribers currently
  running in this Puffer process.

  Returns JSON: `{ "subscriptions": [...], "running_subscribers": [...] }`.

  Use this to answer "what am I subscribed to?" / "is my IoC watcher
  running?" without polling the disk yourself.
handler: runtime:workflow:subscription_list
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties: {}
  additionalProperties: false
