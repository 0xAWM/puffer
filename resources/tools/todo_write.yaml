id: TodoWrite
name: TodoWrite
description: |-
  Create or replace the structured todo list for the current coding session.

  Use this proactively for complex, multi-step implementation work so progress
  stays visible and organized. Mark one item as `in_progress` before starting
  it, then mark it `completed` when done.

  Good times to use it:
  - tasks with 3 or more meaningful steps
  - non-trivial investigations or implementations
  - when the user gives you multiple requests
  - right after new instructions arrive so requirements are captured
  - when a search or initial inspection shows the task spans multiple files or phases
  - when new follow-up work is discovered during implementation

  Avoid this tool for single-step, trivial, or purely conversational requests.
  Keep exactly one item `in_progress` at a time, update statuses as you work,
  and do not mark a task completed until it is fully done.

  Task management rules:
  - Mark a task `in_progress` before you start it.
  - Mark tasks completed immediately after finishing them; do not batch completions.
  - Remove tasks that are no longer relevant.
  - When blocked, keep the current task `in_progress` and add a follow-up task describing what must be resolved.
  - When in doubt for non-trivial work, prefer using this tool.
handler: runtime:workflow:todo_write
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    todos:
      type: array
      description: The updated todo list.
      items:
        type: object
        properties:
          content:
            type: string
            description: Todo content.
          status:
            type: string
            enum:
              - pending
              - in_progress
              - completed
          activeForm:
            type: string
            description: Present continuous form for progress display.
        required:
          - content
          - status
          - activeForm
  required:
    - todos
  additionalProperties: false
