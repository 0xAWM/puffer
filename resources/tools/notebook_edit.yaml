id: NotebookEdit
name: NotebookEdit
description: |-
  Completely replaces the contents of a specific cell in a Jupyter notebook
  (.ipynb file) with new source.

  Jupyter notebooks combine code, text, and visualizations for data analysis
  and scientific computing.

  Usage:
  - `notebook_path` must be an absolute path.
  - Read the notebook with `Read` before editing it. This tool fails if the
    notebook has not been fully read or if it changed after it was read.
  - `cell_id` identifies the target cell. Existing cell ids and `cell-N` or
    numeric index fallbacks are accepted.
  - Use `edit_mode: "insert"` to add a new cell after `cell_id`, or at the
    beginning if `cell_id` is omitted.
  - Use `edit_mode: "delete"` to remove the target cell.
  - `cell_type` is required when inserting and may be `code` or `markdown`.
handler: runtime:notebook_edit
approval_policy: on-request
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    notebook_path:
      type: string
      description: The absolute path to the Jupyter notebook file to edit (must be absolute, not relative).
    cell_id:
      type: string
      description: The ID of the cell to edit. When inserting a new cell, the new cell will be inserted after the cell with this ID, or at the beginning if not specified.
    new_source:
      type: string
      description: The new source for the cell.
    cell_type:
      type: string
      enum:
        - code
        - markdown
      description: The type of the cell (code or markdown). If not specified, it defaults to the current cell type. If using edit_mode=insert, this is required.
    edit_mode:
      type: string
      enum:
        - replace
        - insert
        - delete
      description: The type of edit to make (replace, insert, delete). Defaults to replace.
  required:
    - notebook_path
    - new_source
  additionalProperties: false
display:
  group: files
  title: NotebookEdit
  show_in_status: true
