id: SubscriberScaffold
name: SubscriberScaffold
description: |-
  Create a new **subscriber skill** on disk under
  `~/.puffer/subscribers/<id>/`. A subscriber is a tiny program (any
  language) that emits ndjson events on stdout — one event per new item
  observed in the data source it watches (RSS feed, GitHub
  notifications, file changes, calendar invites, …).

  This tool only **scaffolds** the directory: a starter `manifest.toml`,
  a `run` stub in the chosen language with the ndjson protocol wired up,
  and a `README.md` describing what to fill in. After this call, edit
  `run` to implement the real polling logic, then call
  `SubscriberInstall` to start it.

  ## When to call

  - The user asks to watch a data source Puffer doesn't already cover
    (RSS, Hacker News, GitHub releases, a remote API, a file on disk).
  - You've confirmed there's no existing bundled subscriber for that
    source via `SubscriberList`.

  ## After you call this

  1. Read the generated `README.md` so you know the protocol.
  2. Use Edit/Write to fill in the `run` script's `poll_once` (or
     equivalent) so it actually fetches the source and calls `emit(...)`
     once per new item.
  3. Confirm with the user, then call `SubscriberInstall` with the same id.

  ## Constraints

  - `id` must be lowercase kebab-case (`a-z`, `0-9`, `-`).
  - Languages supported by the stub: `python`, `sh`, `node`. The user
    must have the runtime installed on their machine.
handler: runtime:workflow:subscriber_scaffold
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    id:
      type: string
      pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
      description: Stable kebab-case id (e.g. "rss-hn").
    description:
      type: string
      description: One-paragraph description; written into the README.
    language:
      type: string
      enum: [python, sh, node]
    topic:
      type: string
      description: Optional topic override; defaults to the id.
  required: [id, description, language]
  additionalProperties: false
