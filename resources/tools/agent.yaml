id: Agent
name: Agent
aliases:
  - Task
description: |-
  Launch a new agent to handle complex, multi-step tasks autonomously.

  The Agent tool launches specialized agents (subprocesses) that autonomously handle complex tasks. Each agent type has specific capabilities and tools available to it.

  Available agent types and the tools they have access to:
  {{AVAILABLE_AGENT_TYPES}}

  When using the Agent tool, specify a subagent_type parameter to select which agent type to use. If omitted, the general-purpose agent is used.

  When NOT to use the Agent tool:
  - If you want to read a specific file path, use the Read tool or the Glob tool instead of the Agent tool, to find the match more quickly
  - If you are searching for a specific class definition like "class Foo", use the Grep tool instead, to find the match more quickly
  - If you are searching for code within a specific file or set of 2-3 files, use the Read tool instead of the Agent tool, to find the match more quickly
  - Other tasks that are not related to the agent descriptions above

  Usage notes:
  - Always include a short description (3-5 words) summarizing what the agent will do
  - Launch multiple agents concurrently whenever possible, to maximize performance; to do that, use a single message with multiple tool uses
  - When the agent is done, it will return a single message back to you. The result returned by the agent is not visible to the user. To show the user the result, you should send a text message back to the user with a concise summary of the result.
  - You can optionally run agents in the background using the run_in_background parameter. When an agent runs in the background, you will be automatically notified when it completes - do NOT sleep, poll, or proactively check on its progress. Continue with other work or respond to the user instead.
  - **Foreground vs background**: Use foreground (default) when you need the agent's results before you can proceed - e.g., research agents whose findings inform your next steps. Use background when you have genuinely independent work to do in parallel.
  - To continue a previously spawned agent, use SendMessage with the agent's ID or name as the `to` field. The agent resumes with its full context preserved. Each Agent invocation starts fresh - provide a complete task description.
  - The agent's outputs should generally be trusted
  - Clearly tell the agent whether you expect it to write code or just to do research (search, file reads, web fetches, etc.), since it is not aware of the user's intent
  - If the agent description mentions that it should be used proactively, then you should try your best to use it without the user having to ask for it first. Use your judgement.
  - If the user specifies that they want you to run agents "in parallel", you MUST send a single message with multiple Agent tool use content blocks. For example, if you need to launch both a build-validator agent and a test-runner agent in parallel, send a single message with both tool calls.
  - You can optionally set `isolation: "worktree"` to run the agent in a temporary git worktree, giving it an isolated copy of the repository. The worktree is automatically cleaned up if the agent makes no changes; if changes are made, the worktree path and branch are returned in the result.

  ## Writing the prompt

  Brief the agent like a smart colleague who just walked into the room - it hasn't seen this conversation, doesn't know what you've tried, doesn't understand why this task matters.
  - Explain what you're trying to accomplish and why.
  - Describe what you've already learned or ruled out.
  - Give enough context about the surrounding problem that the agent can make judgment calls rather than just following a narrow instruction.
  - If you need a short response, say so ("report in under 200 words").
  - Lookups: hand over the exact command. Investigations: hand over the question - prescribed steps become dead weight when the premise is wrong.

  Terse command-style prompts produce shallow, generic work.

  **Never delegate understanding.** Don't write "based on your findings, fix the bug" or "based on the research, implement it." Those phrases push synthesis onto the agent instead of doing it yourself. Write prompts that prove you understood: include file paths, line numbers, what specifically to change.

  Example usage:

  <example_agent_descriptions>
  "test-runner": use this agent after you are done writing code to run tests
  "greeting-responder": use this agent to respond to user greetings with a friendly joke
  </example_agent_descriptions>

  <example>
  user: "Please write a function that checks if a number is prime"
  assistant: I'm going to use the Write tool to write the following code:
  <code>
  function isPrime(n) {
    if (n <= 1) return false
    for (let i = 2; i * i <= n; i++) {
      if (n % i === 0) return false
    }
    return true
  }
  </code>
  <commentary>
  Since a significant piece of code was written and the task was completed, now use the test-runner agent to run the tests
  </commentary>
  assistant: Uses the Agent tool to launch the test-runner agent
  </example>

  <example>
  user: "Hello"
  <commentary>
  Since the user is greeting, use the greeting-responder agent to respond with a friendly joke
  </commentary>
  assistant: I'm going to use the Agent tool to launch the greeting-responder agent
  </example>
handler: runtime:agent
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    description:
      type: string
      description: Short description of the delegated task.
    prompt:
      type: string
      description: Full task instructions for the subagent, including goal, context, prior findings, and constraints.
    subagent_type:
      type: string
      description: Optional agent id to run. Defaults to general-purpose.
    model:
      type: string
      description: Optional model override for the subagent. Accepts provider/model selectors as well as provider-native aliases when supported.
    effort:
      oneOf:
        - type: string
        - type: integer
      description: Optional effort override for the subagent.
    permission_mode:
      type: string
      description: Optional permission mode override for the spawned agent.
    max_turns:
      type: integer
      minimum: 1
      description: Optional maximum number of turns the spawned agent should use.
    run_in_background:
      type: boolean
      description: When true, request background execution.
    cwd:
      type: string
      description: Optional working directory override for the subagent.
    isolation:
      type: string
      enum:
        - worktree
      description: Optional isolation mode. Currently only worktree isolation is supported.
    name:
      type: string
      description: Optional label for the subagent invocation.
    team_name:
      type: string
      description: Optional team name for spawning or attaching to coordinated work.
    mode:
      type: string
      enum:
        - acceptEdits
        - bypassPermissions
        - default
        - dontAsk
        - plan
      description: Optional permission mode override for the spawned agent. Use only when a specific teammate flow requires it.
    initial_prompt:
      type: string
      description: Optional prompt text to prepend ahead of the delegated task prompt.
  required:
    - description
    - prompt
  additionalProperties: false
