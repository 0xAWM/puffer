id: WorkflowRegister
name: WorkflowRegister
description: |-
  Register a native Puffer workflow from structured JSON.

  Use this after translating a user's workflow request into a JSON definition.
  Puffer stores workflow definitions in the current workspace and executes the
  embedded AgentFlow-shaped `pipeline` natively as a local Puffer agent DAG.

  The preferred shape is a Puffer envelope:

  - `slug`: kebab-case workflow id.
  - `enabled`: boolean, defaults to true.
  - `trigger`: either `{"type":"cron","cron":"0 9 * * *"}` or
    `{"type":"subscription","source_topic":"telegram-user"}`.
  - `pipeline`: AgentFlow-compatible fields: `name`, `working_dir`,
    `concurrency`, `nodes`, and per-node `id`, `depends_on`, `agent`,
    `prompt`, `model`, `tools`, `env`.

  Raw AgentFlow pipeline JSON is also accepted when the optional top-level
  `trigger` field is supplied to this tool. Unsupported AgentFlow features
  such as remote targets, Python/shell/sync nodes, fanout/merge, and graph
  optimization are rejected with explicit errors.
handler: runtime:workflow:workflow_register
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    slug:
      type: string
      description: Optional slug override for raw pipeline imports.
    trigger:
      type: object
      description: Optional trigger for raw AgentFlow pipeline imports.
      oneOf:
        - properties:
            type:
              type: string
              enum: [cron]
            cron:
              type: string
          required: [type, cron]
        - properties:
            type:
              type: string
              enum: [subscription]
            source_topic:
              type: string
            pattern:
              type: string
            classify_prompt:
              type: string
          required: [type, source_topic]
    workflow:
      type: object
      description: Puffer workflow envelope or raw AgentFlow pipeline JSON.
  required: [workflow]
  additionalProperties: false
