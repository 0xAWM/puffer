id: SendMessage
name: SendMessage
description: |-
  # SendMessage

  Send a message to another agent.

  ```json
  {"to": "researcher", "summary": "assign task 1", "message": "start on task #1"}
  ```

  | `to` | |
  |---|---|
  | `"researcher"` | Teammate by name |
  | `"*"` | Broadcast to all teammates — expensive (linear in team size), use only when everyone genuinely needs it |

  Your plain text output is NOT visible to other agents — to communicate, you MUST call this tool. Messages from teammates are delivered automatically; you don't check an inbox. Refer to teammates by name, never by UUID. When relaying, don't quote the original — it's already rendered to the user.

  ## Protocol responses (legacy)

  If you receive a JSON message with `type: "shutdown_request"` or `type: "plan_approval_request"`, respond with the matching `_response` type — echo the `request_id`, set `approve` true/false:

  ```json
  {"to": "team-lead", "message": {"type": "shutdown_response", "request_id": "...", "approve": true}}
  {"to": "researcher", "message": {"type": "plan_approval_response", "request_id": "...", "approve": false, "feedback": "add error handling"}}
  ```

  Approving shutdown terminates your process. Rejecting plan sends the teammate back to revise. Don't originate `shutdown_request` unless asked. Don't send structured JSON status messages — use TaskUpdate.
handler: runtime:workflow:send_message
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    to:
      type: string
      description: Recipient name, wildcard, or supported endpoint address.
    summary:
      type: string
      description: Optional short summary preview, typically 5-10 words.
    message:
      description: Message payload as plain text or structured control message.
      anyOf:
        - type: string
        - type: object
          properties:
            type:
              type: string
              enum:
                - shutdown_request
            reason:
              type: string
          required:
            - type
          additionalProperties: false
        - type: object
          properties:
            type:
              type: string
              enum:
                - shutdown_response
            request_id:
              type: string
            approve:
              type: boolean
            reason:
              type: string
          required:
            - type
            - request_id
            - approve
          additionalProperties: false
        - type: object
          properties:
            type:
              type: string
              enum:
                - plan_approval_response
            request_id:
              type: string
            approve:
              type: boolean
            feedback:
              type: string
          required:
            - type
            - request_id
            - approve
          additionalProperties: false
  required:
    - to
    - message
  additionalProperties: false
