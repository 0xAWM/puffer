id: SendMessage
name: SendMessage
description: |-
  Send a message to another agent, teammate, team, or compatible peer endpoint.

  Plain text outside this tool is not visible to other agents. If you need to
  communicate with them, you must call this tool.

  Usage notes:
  - `to` may be a teammate name, `*` for broadcast, a team name, or another
    supported endpoint identifier.
  - Broadcast is expensive. Use `*` only when everyone genuinely needs the message.
  - `summary` should be a short preview when useful.
  - `message` may be plain text or a structured control payload such as a
    shutdown or plan-approval response.
  - Messages are delivered automatically; you do not need to poll an inbox.
  - Refer to teammates by name, not UUID.
  - When relaying a teammate message to the user, summarize it instead of
    quoting it verbatim.
  - If you receive a legacy structured protocol request such as
    `shutdown_request` or `plan_approval_request`, respond with the matching
    `_response` payload and echo the `request_id`.
  - Do not originate `shutdown_request` yourself unless explicitly asked.
  - Do not send structured JSON status chatter; use normal text unless you are
    responding to a shutdown or plan-approval request.
handler: runtime:workflow:send_message
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    to:
      type: string
      description: Recipient name, wildcard, or supported endpoint address.
    summary:
      type: string
      description: Optional short summary preview, typically 5-10 words.
    message:
      description: Message payload as plain text or structured control message.
      anyOf:
        - type: string
        - type: object
          properties:
            type:
              type: string
              enum:
                - shutdown_request
            reason:
              type: string
          required:
            - type
          additionalProperties: false
        - type: object
          properties:
            type:
              type: string
              enum:
                - shutdown_response
            request_id:
              type: string
            approve:
              type: boolean
            reason:
              type: string
          required:
            - type
            - request_id
            - approve
          additionalProperties: false
        - type: object
          properties:
            type:
              type: string
              enum:
                - plan_approval_response
            request_id:
              type: string
            approve:
              type: boolean
            feedback:
              type: string
          required:
            - type
            - request_id
            - approve
          additionalProperties: false
  required:
    - to
    - message
  additionalProperties: false
