id: TelegramLoginSubmitPassword
name: TelegramLoginSubmitPassword
description: |-
  Submit the user's Telegram 2FA cloud password. Only call this after the
  `telegram-user` subscriber emitted a `login_awaiting_password` event in
  response to `TelegramLoginSubmitCode`.

  Treat the password as a secret: do not echo it back, do not write it to
  disk, do not include it in any other tool call. The subscriber stores
  only the resulting auth session, never the password itself.
handler: runtime:workflow:telegram_login_submit_password
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    password:
      type: string
      description: The user's 2FA cloud password.
  required: [password]
  additionalProperties: false
