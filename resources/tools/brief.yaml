id: Brief
name: Brief
description: |-
  Send a message the user will actually read.

  `message` supports markdown. `attachments` accepts file paths for images,
  diffs, logs, and similar artifacts. `status` distinguishes a normal reply
  from a proactive update you are initiating yourself.

  Text outside this tool is visible in the detail view, but most users will not
  open it. Assume unread. Put the real answer here.

  Use this tool for every user-visible reply. Even simple replies like "hi" or
  "thanks" should go here. If you can answer immediately, send the answer. If
  you need to investigate first, send a one-line acknowledgement here before
  you work, then send the result. For longer work, use meaningful checkpoints
  when something useful changed; skip filler.
handler: runtime:workflow:send_user_message
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    message:
      type: string
      description: The message for the user. Supports markdown formatting.
    attachments:
      type: array
      description: Optional file paths to attach.
      items:
        type: string
    status:
      type: string
      enum:
        - normal
        - proactive
      description: Labels intent for reply vs proactive user update.
  required:
    - message
    - status
  additionalProperties: false
