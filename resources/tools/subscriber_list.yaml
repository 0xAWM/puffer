id: SubscriberList
name: SubscriberList
description: |-
  List every discoverable subscriber skill (bundled, user, and
  workspace) along with whether it is currently running.

  Use this before scaffolding a new subscriber to check whether
  Puffer already ships one for the data source the user wants.

  Returns a JSON array of `{ id, topic, display_name, source, dir, running }`.
handler: runtime:workflow:subscriber_list
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties: {}
  additionalProperties: false
