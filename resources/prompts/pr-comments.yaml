id: pr-comments
description: Summarize and respond to pull-request comments.
mode: pr-comments
variables:
  - name: ARGUMENTS
    description: Extra PR context or reviewer focus.
  - name: SESSION_ID
    description: Current session identifier.
template: |
  Gather and summarize pull-request comments relevant to the current work.
  Session: $SESSION_ID
  Additional context: $ARGUMENTS
